<div class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50 py-12">
  <div class="max-w-4xl mx-auto px-4">
    <!-- Header -->
    <div class="text-center mb-12">
      <span class="text-[#FF6D00] font-semibold text-sm uppercase tracking-wider">Ressources</span>
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mt-2">
        📖 <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#1A73E8] to-[#FF6D00]">Glossaire</span>
      </h1>
      <p class="mt-4 text-lg text-gray-600 max-w-2xl mx-auto">
        Définitions des termes scolaires par matière
      </p>
    </div>

    <!-- Search & Filters -->
    <div class="bg-white rounded-3xl shadow-xl p-6 mb-8">
      <!-- Search -->
      <div class="relative mb-6">
        <input 
          type="text" 
          [(ngModel)]="searchQuery"
          placeholder="Rechercher un terme..."
          class="w-full pl-12 pr-4 py-4 border-2 border-gray-200 rounded-xl focus:border-[#1A73E8] focus:bg-blue-50/30 transition outline-none text-lg" />
        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>

      <!-- Subject Filters -->
      <div class="flex flex-wrap gap-2">
        <button 
          *ngFor="let subject of subjects()"
          (click)="filterBySubject(subject)"
          [class]="selectedSubject() === subject 
            ? 'bg-gradient-to-r from-[#1A73E8] to-[#FF6D00] text-white' 
            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
          class="px-4 py-2 rounded-full font-medium transition-all">
          {{ subject === 'all' ? 'Tous' : subject }}
        </button>
      </div>
    </div>

    <!-- Results Count -->
    <div class="mb-4 text-gray-600">
      <span class="font-bold text-[#1A73E8]">{{ filteredTerms().length }}</span> terme(s) trouvé(s)
    </div>

    <!-- Terms List -->
    <div class="space-y-4">
      <div *ngFor="let term of filteredTerms()" 
           class="bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-xl transition-all">
        <div class="p-6">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <h3 class="text-xl font-bold text-gray-900">{{ term.term }}</h3>
                <span class="px-3 py-1 bg-[#1A73E8]/10 text-[#1A73E8] rounded-full text-sm font-medium">
                  {{ term.subject }}
                </span>
              </div>
              <p class="text-gray-600 leading-relaxed">{{ term.definition }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="filteredTerms().length === 0" class="text-center py-12">
      <div class="text-6xl mb-4">🔍</div>
      <h3 class="text-xl font-bold text-gray-900 mb-2">Aucun terme trouvé</h3>
      <p class="text-gray-600">Essayez avec d'autres mots-clés</p>
    </div>
  </div>
</div>
