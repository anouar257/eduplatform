<div class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50 py-8">
  <div class="mx-auto w-full max-w-7xl px-4">
    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-gray-900 sm:text-5xl">
        📚 Catalogue de <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#1A73E8] to-[#FF6D00]">cours</span>
      </h1>
      <p class="mt-3 text-lg text-gray-600">Découvrez nos formations adaptées à tous les niveaux</p>
    </div>

    <div class="grid gap-6 lg:grid-cols-12">
      <!-- Modern Sidebar filters -->
      <aside class="lg:col-span-4 xl:col-span-3">
        <div class="sticky top-24">
          <form [formGroup]="filtersForm" class="rounded-3xl bg-white shadow-xl border border-gray-100 overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-[#1A73E8] to-[#FF6D00] px-6 py-4">
              <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-white">🔍 Filtres</h2>
                <button
                  type="button"
                  (click)="clearFilters()"
                  class="text-sm font-medium text-white/80 hover:text-white transition">
                  Réinitialiser
                </button>
              </div>
            </div>

            <div class="p-6 space-y-6">
              <!-- Search -->
              <div>
                <label class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-3">
                  <span class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">🔎</span>
                  Recherche
                </label>
                <div class="relative">
                  <input
                    type="text"
                    formControlName="search"
                    placeholder="Titre, professeur..."
                    class="w-full rounded-xl border-2 border-gray-200 bg-gray-50 px-4 py-3 text-sm outline-none focus:border-[#1A73E8] focus:bg-white transition" />
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                  </div>
                </div>
              </div>

              <!-- Category -->
              <div>
                <label class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-3">
                  <span class="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">📖</span>
                  Catégorie
                </label>
                <div class="relative">
                  <select
                    formControlName="category"
                    class="w-full appearance-none rounded-xl border-2 border-gray-200 bg-gray-50 px-4 py-3 text-sm outline-none focus:border-[#1A73E8] focus:bg-white transition cursor-pointer">
                    <option value="">Toutes les catégories</option>
                    <option *ngFor="let cat of categories()" [value]="cat">{{ cat }}</option>
                  </select>
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </div>
                </div>
              </div>

              <!-- Level -->
              <div>
                <label class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-3">
                  <span class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">🎯</span>
                  Niveau
                </label>
                <div class="relative">
                  <select
                    formControlName="level"
                    class="w-full appearance-none rounded-xl border-2 border-gray-200 bg-gray-50 px-4 py-3 text-sm outline-none focus:border-[#1A73E8] focus:bg-white transition cursor-pointer">
                    <option value="">Tous les niveaux</option>
                    <option *ngFor="let lvl of levels()" [value]="lvl">{{ lvl }}</option>
                  </select>
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </div>
                </div>
              </div>
            </div>

            <!-- Stats -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-100">
              <p class="text-sm text-center text-gray-600">
                <span class="font-bold text-[#1A73E8]">{{ filteredCourses().length }}</span> cours disponibles
              </p>
            </div>
          </form>
        </div>
      </aside>

      <!-- Content -->
      <section class="lg:col-span-8 xl:col-span-9">
        <!-- Skeletons -->
        <div *ngIf="isLoading()" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          <app-skeleton-card *ngFor="let x of [1,2,3,4,5,6]" />
        </div>

        <!-- Grid -->
        <div *ngIf="!isLoading()" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          <app-course-card *ngFor="let course of filteredCourses()" [course]="course" />
        </div>

        <!-- Empty -->
        <div *ngIf="!isLoading() && filteredCourses().length === 0" class="mt-10 rounded-3xl border-2 border-dashed border-gray-300 bg-white p-12 text-center">
          <div class="text-6xl mb-4">🔍</div>
          <h3 class="text-xl font-bold text-gray-900">Aucun cours trouvé</h3>
          <p class="mt-2 text-gray-600">Essayez de modifier vos filtres de recherche</p>
          <button
            type="button"
            (click)="clearFilters()"
            class="mt-6 inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-[#1A73E8] to-[#FF6D00] px-6 py-3 font-semibold text-white shadow-lg hover:shadow-xl transition-all hover:scale-105">
            Réinitialiser les filtres
          </button>
        </div>
      </section>
    </div>
  </div>
</div>
