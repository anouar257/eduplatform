<div class="min-h-screen bg-[#F8F9FA] py-8">
  <div class="mx-auto w-full max-w-3xl px-4">
    <div class="mb-8 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-bold text-gray-900">Modifier le profil</h1>
    </div>

    <form (ngSubmit)="onSubmit()" #profileForm="ngForm" class="space-y-6">
      <!-- Informations personnelles -->
      <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm space-y-4">
        <h2 class="text-lg font-semibold text-gray-900 border-b border-gray-100 pb-2">Informations personnelles</h2>
        
        <div class="flex items-center gap-6 py-4">
          <div class="h-20 w-20 rounded-full bg-gradient-to-br from-[#1A73E8] to-[#FF6D00] flex items-center justify-center text-white text-2xl font-bold shadow-lg">
            {{ profile.firstName.charAt(0) }}{{ profile.lastName.charAt(0) }}
          </div>
          <div>
            <label class="block text-sm font-medium text-[#1A73E8] cursor-pointer hover:underline">
              <span>Changer d'avatar (URL)</span>
              <input type="url" [(ngModel)]="profile.avatarUrl" name="avatarUrl" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 text-gray-900 focus:border-[#1A73E8]">
            </label>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Prénom</label>
            <input type="text" [(ngModel)]="profile.firstName" name="firstName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-[#1A73E8]">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Nom</label>
            <input type="text" [(ngModel)]="profile.lastName" name="lastName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-[#1A73E8]">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" [(ngModel)]="profile.email" name="email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-[#1A73E8]">
        </div>
      </div>

      <!-- Sécurité -->
      <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm space-y-4">
        <h2 class="text-lg font-semibold text-gray-900 border-b border-gray-100 pb-2">Sécurité (Optionnel)</h2>
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Mot de passe actuel</label>
          <input type="password" [(ngModel)]="profile.currentPassword" name="currentPassword" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-[#1A73E8]" placeholder="••••••••">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Nouveau mot de passe</label>
          <input type="password" [(ngModel)]="profile.newPassword" name="newPassword" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-[#1A73E8]" placeholder="••••••••">
        </div>
      </div>

      <div class="flex justify-end gap-3 pb-8">
        <button type="button" (click)="router.navigate(['/dashboard'])" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">Annuler</button>
        <button type="submit" [disabled]="!profileForm.form.valid" class="rounded-xl bg-gradient-to-br from-[#1A73E8] to-[#FF6D00] px-6 py-2 text-sm font-semibold text-white transition disabled:opacity-50 hover:opacity-90">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
