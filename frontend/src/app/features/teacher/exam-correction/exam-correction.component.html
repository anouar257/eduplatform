<div class="min-h-screen bg-[#F8F9FA] py-8">
  <div class="mx-auto w-full max-w-5xl px-4">
    <div class="mb-8 flex items-center justify-between rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Correction d'examen</h1>
        <p class="mt-1 text-gray-600">ID Examen: {{ examId }}</p>
      </div>
      <button (click)="router.navigate(['/teacher'])" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
        Retour au dashboard
      </button>
    </div>

    <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b border-gray-200">
              <th class="pb-3 text-left text-sm font-medium text-gray-500">Étudiant</th>
              <th class="pb-3 text-left text-sm font-medium text-gray-500">Date soumission</th>
              <th class="pb-3 text-left text-sm font-medium text-gray-500">Statut</th>
              <th class="pb-3 text-left text-sm font-medium text-gray-500">Note</th>
              <th class="pb-3 text-right text-sm font-medium text-gray-500">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let sub of submissions" class="border-b border-gray-100">
              <td class="py-4 font-medium text-gray-900">{{ sub.studentName }}</td>
              <td class="py-4 text-gray-600">{{ sub.date }}</td>
              <td class="py-4">
                <span *ngIf="sub.status === 'Graded'" class="rounded-full bg-green-100 px-2 py-1 text-xs font-semibold text-green-700">Corrigé</span>
                <span *ngIf="sub.status === 'Pending'" class="rounded-full bg-yellow-100 px-2 py-1 text-xs font-semibold text-yellow-700">En attente</span>
              </td>
              <td class="py-4 font-medium" [ngClass]="{'text-[#34A853]': sub.score >= 50, 'text-red-500': sub.score > 0 && sub.score < 50, 'text-gray-400': sub.score === 0}">
                {{ sub.score > 0 ? sub.score + '/100' : '-' }}
              </td>
              <td class="py-4 text-right">
                <button (click)="gradeSubmission(sub.id)" class="text-[#1A73E8] hover:underline font-medium">
                  {{ sub.status === 'Pending' ? 'Corriger' : 'Revoir' }}
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="submissions.length === 0" class="py-8 text-center text-gray-500">
        Aucune soumission pour le moment.
      </div>
    </div>
  </div>
</div>
