<div class="min-h-screen bg-[#F8F9FA] py-8">
  <div class="mx-auto w-full max-w-2xl px-4">
    <div class="mb-8 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-bold text-gray-900">Planifier une session en direct</h1>
    </div>

    <form (ngSubmit)="onSubmit()" #sessionForm="ngForm" class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Titre de la session</label>
        <input type="text" [(ngModel)]="session.title" name="title" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#1A73E8] focus:ring-[#1A73E8] p-2 border">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Date</label>
          <input type="date" [(ngModel)]="session.date" name="date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#1A73E8] focus:ring-[#1A73E8] p-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Heure</label>
          <input type="time" [(ngModel)]="session.time" name="time" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#1A73E8] focus:ring-[#1A73E8] p-2 border">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Lien Google Meet / Teams</label>
        <input type="url" [(ngModel)]="session.meetUrl" name="meetUrl" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#1A73E8] focus:ring-[#1A73E8] p-2 border" placeholder="https://meet.google.com/...">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea [(ngModel)]="session.description" name="description" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#1A73E8] focus:ring-[#1A73E8] p-2 border"></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" (click)="router.navigate(['/teacher'])" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">Annuler</button>
        <button type="submit" [disabled]="!sessionForm.form.valid" class="rounded-xl bg-gradient-to-br from-[#1A73E8] to-[#FF6D00] px-6 py-2 text-sm font-semibold text-white transition disabled:opacity-50 hover:opacity-90">Planifier</button>
      </div>
    </form>
  </div>
</div>
